<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#863bff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stock-TimeFM" />
    <title>Stock-TimeFM Dashboard</title>
    <!-- Apply the saved theme before first paint so there's no flash of the
         wrong theme. Mirrors the key used by src/store/useTheme.ts. -->
    <script>
      try {
        document.documentElement.setAttribute(
          "data-theme",
          localStorage.getItem("stf-theme") || "dark"
        );
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
